<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <defs>
    <linearGradient id="nw-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1565C0"/>
      <stop offset="100%" stop-color="#42A5F5"/>
    </linearGradient>
  </defs>
  <!-- Icon circle -->
  <circle cx="60" cy="60" r="50" fill="url(#nw-grad)"/>
  <!-- Building / corporate icon -->
  <g transform="translate(60,60)" fill="#FFFFFF">
    <!-- Main building -->
    <rect x="-14" y="-28" width="28" height="46" rx="2" opacity="0.95"/>
    <!-- Left wing -->
    <rect x="-28" y="-12" width="16" height="30" rx="2" opacity="0.75"/>
    <!-- Right wing -->
    <rect x="12" y="-12" width="16" height="30" rx="2" opacity="0.75"/>
    <!-- Windows main -->
    <rect x="-8" y="-22" width="5" height="5" rx="1" fill="#1565C0"/>
    <rect x="3" y="-22" width="5" height="5" rx="1" fill="#1565C0"/>
    <rect x="-8" y="-12" width="5" height="5" rx="1" fill="#1565C0"/>
    <rect x="3" y="-12" width="5" height="5" rx="1" fill="#1565C0"/>
    <rect x="-8" y="-2" width="5" height="5" rx="1" fill="#1565C0"/>
    <rect x="3" y="-2" width="5" height="5" rx="1" fill="#1565C0"/>
    <!-- Door -->
    <rect x="-4" y="8" width="8" height="10" rx="1.5" fill="#E65100"/>
    <!-- People silhouettes (abstract) -->
    <circle cx="-22" cy="-18" r="3" fill="#FF8F00" opacity="0.7"/>
    <circle cx="22" cy="-18" r="3" fill="#FF8F00" opacity="0.7"/>
  </g>
  <!-- Company name -->
  <text x="125" y="50" font-family="Segoe UI, Arial, sans-serif" font-weight="700" font-size="32" fill="#1565C0">Northwind</text>
  <text x="125" y="82" font-family="Segoe UI, Arial, sans-serif" font-weight="400" font-size="24" fill="#E65100">HR &amp; Finance</text>
  <!-- Tagline -->
  <text x="125" y="105" font-family="Segoe UI, Arial, sans-serif" font-weight="300" font-size="12" fill="#666666">People, Payroll &amp; Performance</text>
</svg>
