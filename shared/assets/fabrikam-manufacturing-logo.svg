<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <defs>
    <linearGradient id="fm-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1565C0"/>
      <stop offset="100%" stop-color="#42A5F5"/>
    </linearGradient>
  </defs>
  <!-- Icon circle -->
  <circle cx="60" cy="60" r="50" fill="url(#fm-grad)"/>
  <!-- Gear icon -->
  <g transform="translate(60,60)" fill="#FFFFFF">
    <circle cx="0" cy="0" r="10" fill="none" stroke="#FFFFFF" stroke-width="3"/>
    <rect x="-3" y="-28" width="6" height="12" rx="2"/>
    <rect x="-3" y="16" width="6" height="12" rx="2"/>
    <rect x="-28" y="-3" width="12" height="6" rx="2"/>
    <rect x="16" y="-3" width="12" height="6" rx="2"/>
    <rect x="14" y="-20" width="6" height="12" rx="2" transform="rotate(45)"/>
    <rect x="-20" y="8" width="6" height="12" rx="2" transform="rotate(45)"/>
    <rect x="8" y="14" width="6" height="12" rx="2" transform="rotate(-45)"/>
    <rect x="-20" y="-20" width="6" height="12" rx="2" transform="rotate(-45)"/>
  </g>
  <!-- Company name -->
  <text x="125" y="50" font-family="Segoe UI, Arial, sans-serif" font-weight="700" font-size="32" fill="#1565C0">Fabrikam</text>
  <text x="125" y="82" font-family="Segoe UI, Arial, sans-serif" font-weight="400" font-size="24" fill="#E65100">Manufacturing</text>
  <!-- Tagline -->
  <text x="125" y="105" font-family="Segoe UI, Arial, sans-serif" font-weight="300" font-size="12" fill="#666666">Smart Factory &amp; Supply Chain</text>
</svg>
